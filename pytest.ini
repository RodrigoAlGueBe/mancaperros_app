[pytest]
# Pytest configuration for mancaperros_app

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum Python version
minversion = 3.8

# Output options
addopts =
    # Verbose output with test names
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test types (passed, failed, skipped, etc.)
    -ra
    # Strict markers - fail on unknown markers
    --strict-markers
    # Show warnings
    -W default
    # Coverage options (uncomment to enable)
    # --cov=.
    # --cov-report=html
    # --cov-report=term-missing
    # Disable output capturing for debugging
    # -s

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    auth: marks tests related to authentication
    crud: marks tests for CRUD operations
    api: marks tests for API endpoints
    models: marks tests for database models
    integration: marks tests that require full system
    unit: marks unit tests

# Logging options
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (uncomment to enable)
# timeout = 300

# Test output formatting
console_output_style = progress

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
