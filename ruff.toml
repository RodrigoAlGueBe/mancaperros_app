# Ruff configuration
# Reference: https://docs.astral.sh/ruff/configuration/

[tool.ruff]
# Python version to target
target-version = "py312"

# Maximum line length
line-length = 100

# Include test files
include = ["*.py"]

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    ".tox",
    ".pytest_cache",
    "__pypackages__",
    "migrations",
    "alembic",
]

# Error codes to always enable
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "C",      # flake8-comprehensions
    "B",      # flake8-bugbear
    "U",      # pyupgrade
    "UP",     # pyupgrade
    "D",      # pydocstyle (documentation)
    "N",      # pep8-naming
]

# Error codes to ignore
ignore = [
    "E501",   # Line too long (handled by formatter)
    "W503",   # Line break before binary operator
    "D100",   # Missing module docstring
    "D104",   # Missing package docstring
    "D203",   # 1 blank line required before class docstring
    "D213",   # Multi-line docstring summary should start at second line
    "B008",   # Do not perform function calls in argument defaults
]

# Pydocstyle conventions
pydocstyle.convention = "google"

# isort configuration
[tool.ruff.isort]
profile = "black"
line-length = 100

# Per-file ignores
[tool.ruff.per-file-ignores]
"tests/*" = ["D100", "D101", "D102", "D103"]  # Don't require docstrings in tests
"__init__.py" = ["F401"]  # Unused imports are OK in __init__.py
"migrations/*" = ["D100", "D101", "D102"]  # Don't require docstrings in migrations
"alembic/*" = ["D100", "D101", "D102"]  # Don't require docstrings in alembic

# Naming conventions
[tool.ruff.pep8-naming]
# Ignore these naming rules
ignore-names = [
    "setUp",    # Allow unittest style setup methods
    "tearDown", # Allow unittest style teardown methods
]

# Flake8-bugbear settings
[tool.ruff.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query"]
